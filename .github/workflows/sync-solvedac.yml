name: Sync BOJ problem tiers by solved.ac level

on:
  schedule:
    # UTC 매월 1일 00:00 실행 (= KST 매월 1일 09:00)
    - cron: "0 0 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  stage_1_3:
    name: Stage 1~3 (scan/move + record/report) -> single commit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Stage 1 - Validate jq/root & prepare tier/state directories
        shell: bash
        run: bash .github/scripts/boj-tier-sync/stage1_preflight.sh

      - name: Stage 2 - Batch scan & move (batch=100, cooldown=60s + adaptive)
        id: batch
        shell: bash
        run: bash .github/scripts/boj-tier-sync/stage2_scan_move.sh

      - name: Stage 3 - Write report + Commit (stages 1~3)
        shell: bash
        run: bash .github/scripts/boj-tier-sync/stage3_report_commit.sh

